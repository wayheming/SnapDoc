services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8099:80"
    volumes:
      - ./app:/var/www/html
      - app-storage:/var/www/html/storage/app
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: photo_processor
      DB_USERNAME: photo
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      PROCESSOR_URL: http://processor:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      processor:
        condition: service_started

  worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - ./app:/var/www/html
      - app-storage:/var/www/html/storage/app
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: photo_processor
      DB_USERNAME: photo
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      PROCESSOR_URL: http://processor:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      processor:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: photo_processor
      POSTGRES_USER: photo
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo -d photo_processor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  processor:
    build: ./processor
    volumes:
      - ./processor:/app
      - rembg-models:/root/.u2net
    environment:
      PYTHONUNBUFFERED: "1"

volumes:
  rembg-models:
  redis-data:
  postgres-data:
  app-storage:
